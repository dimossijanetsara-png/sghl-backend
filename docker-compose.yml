
services:
  db:
    image: postgres:15-alpine
    container_name: sghl_postgres
    restart: always
    environment:
      POSTGRES_DB: sghl_db
      POSTGRES_USER: sghl_admin
      POSTGRES_PASSWORD: SecretPassword2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sghl_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: